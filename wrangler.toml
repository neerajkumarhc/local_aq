name = "local-aq"
compatibility_date = "2025-01-01"
pages_build_output_dir = "."

# Optional: lock CORS to your Pages domain once deployed.
# Set via dashboard (Settings → Environment Variables) or:
#   wrangler pages secret put ALLOWED_ORIGIN
#
# [vars]
# ALLOWED_ORIGIN = "https://local-aq.pages.dev"

# OPENAQ_API_KEY must be set as a secret — never put it here.
# Run once after your first deploy:
#   wrangler pages secret put OPENAQ_API_KEY
